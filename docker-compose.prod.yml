# CoreApps ERP - Production Docker Compose
# External services (PostgreSQL, Redis, MinIO) are hosted on VPS at 103.74.5.159
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_URL: ${DB_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service
      - crm-service
      - finance-service
      - hr-service
      - inventory-service
      - accounting-service
      - analytics-service
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/health", "||", "exit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - coreapps-internal

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_URL: ${DB_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3001/health", "||", "exit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 3
