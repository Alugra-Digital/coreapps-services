# Nginx Reverse Proxy Configuration – CoreApps ERP
#
# Deploy this file on your VPS:
#   sudo cp k8s/nginx/erp.alugra.dev.conf /etc/nginx/sites-available/erp.alugra.dev
#   sudo ln -s /etc/nginx/sites-available/erp.alugra.dev /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL certificates via Certbot (run once):
#   sudo certbot --nginx -d erp.alugra.dev
#
# Replace "erp.alugra.dev" with your actual domain throughout this file.

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name erp.alugra.dev;   # ← change to your domain

    # Let Certbot handle ACME challenges for SSL renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (SSL terminated by Nginx) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.alugra.dev;   # ← change to your domain

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/erp.alugra.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.alugra.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (complement the Helmet headers from the app)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/erp.alugra.dev.access.log;
    error_log  /var/log/nginx/erp.alugra.dev.error.log;

    # Max upload size (match gateway's 10mb limit)
    client_max_body_size 10m;

    # ─── API Gateway proxy ────────────────────────────────────────────────────
    location / {
        # k3s Gateway exposed via NodePort 30000
        proxy_pass http://127.0.0.1:30000;

        # HTTP/1.1 required for WebSocket (Socket.IO / notification-service)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info to the app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ─── WebSocket endpoint (Socket.IO) ──────────────────────────────────────
    # notification-service uses Socket.IO; ensure WS upgrade is handled
    location /socket.io/ {
        proxy_pass http://127.0.0.1:30000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;  # keep WS connections alive
    }

    # ─── Health check (bypass proxy for quick status) ─────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
