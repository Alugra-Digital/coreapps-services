# Kubernetes Secret – CoreApps ERP
#
# ⚠️  DO NOT put real values here. This file is a TEMPLATE only.
# Real secrets are created on the server by deploy.sh using:
#   kubectl create secret generic coreapps-secret --from-env-file=.env -n coreapps
#
# This file documents which keys are expected in the secret.
apiVersion: v1
kind: Secret
metadata:
  name: coreapps-secret
  namespace: coreapps
  labels:
    app.kubernetes.io/name: coreapps
    app.kubernetes.io/managed-by: manual
type: Opaque
stringData:
  # Database
  DB_URL: "REPLACE_WITH_REAL_VALUE"
  DB_HOST: "REPLACE_WITH_REAL_VALUE"
  DB_PORT: "5432"

  # JWT
  JWT_SECRET: "REPLACE_WITH_REAL_VALUE"

  # MinIO / S3
  MINIO_ENDPOINT: "REPLACE_WITH_REAL_VALUE"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: "REPLACE_WITH_REAL_VALUE"
  MINIO_SECRET_KEY: "REPLACE_WITH_REAL_VALUE"
  MINIO_BUCKET_NAME: "coreapps"
  MINIO_REGION: "us-east-1"
  S3_ENDPOINT: "REPLACE_WITH_REAL_VALUE"
  S3_ACCESS_KEY: "REPLACE_WITH_REAL_VALUE"
  S3_SECRET_KEY: "REPLACE_WITH_REAL_VALUE"
  S3_BUCKET: "coreapps"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"

  # Redis
  REDIS_HOST: "REPLACE_WITH_REAL_VALUE"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "REPLACE_WITH_REAL_VALUE"

  # CORS
  ALLOWED_ORIGINS: "REPLACE_WITH_REAL_VALUE"

  # Internal service secret (for notification service internal API)
  INTERNAL_SERVICE_SECRET: "REPLACE_WITH_REAL_VALUE"
