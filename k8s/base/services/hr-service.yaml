apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-service
  namespace: coreapps
  labels:
    app: hr-service
    component: microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hr-service
  template:
    metadata:
      labels:
        app: hr-service
        component: microservice
    spec:
      containers:
        - name: hr-service
          image: coreapps-hr-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: NODE_ENV
              value: "production"
          envFrom:
            - secretRef:
                name: coreapps-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: hr-service
  namespace: coreapps
  labels:
    app: hr-service
spec:
  type: ClusterIP
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  selector:
    app: hr-service
