apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: coreapps
  labels:
    app: analytics-service
    component: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        component: microservice
    spec:
      containers:
        - name: analytics-service
          image: coreapps-analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3010
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: ANALYTICS_PORT
              value: "3010"
          envFrom:
            - secretRef:
                name: coreapps-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: coreapps
  labels:
    app: analytics-service
spec:
  type: ClusterIP
  ports:
    - port: 3010
      targetPort: 3010
      name: http
  selector:
    app: analytics-service
