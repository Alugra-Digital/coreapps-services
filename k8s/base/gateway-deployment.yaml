apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: coreapps
  labels:
    app: gateway
    component: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        component: api-gateway
    spec:
      containers:
        - name: gateway
          image: coreapps-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: GATEWAY_PORT
              value: "3000"
            # Correct service URLs matching actual service ports
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: CRM_SERVICE_URL
              value: "http://crm-service:3002"
            - name: FINANCE_SERVICE_URL
              value: "http://finance-service:3003"
            - name: HR_SERVICE_URL
              value: "http://hr-service:3004"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:3005"
            - name: ACCOUNTING_SERVICE_URL
              value: "http://accounting-service:3006"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3010"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:3011"
            - name: MANUFACTURING_SERVICE_URL
              value: "http://manufacturing-service:3012"
            - name: ASSET_SERVICE_URL
              value: "http://asset-service:3013"
          envFrom:
            - secretRef:
                name: coreapps-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: coreapps
  labels:
    app: gateway
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000   # accessible on host at localhost:30000
      protocol: TCP
      name: http
  selector:
    app: gateway
