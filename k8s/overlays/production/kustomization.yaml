apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: coreapps

resources:
  - ../../base

patches:
  - path: replica-patch.yaml
  - path: resource-patch.yaml

configMapGenerator:
  - name: app-config
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - JWT_EXPIRY=24h

generatorOptions:
  disableNameSuffixHash: true
