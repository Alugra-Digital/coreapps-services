name: CoreApps CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coreapps_test
          POSTGRES_PASSWORD: coreapps_test_pw
          POSTGRES_DB: coreapps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coreapps_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql://coreapps_test:coreapps_test_pw@localhost:5432/coreapps_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    strategy:
      matrix:
        service:
          - auth-service
          - hr-service
          - finance-service
          - inventory-service
          - crm-service
          - accounting-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies (shared)
        uses: actions/cache@v4
        with:
          path: services/shared/node_modules
          key: ${{ runner.os }}-npm-shared-${{ hashFiles('services/shared/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-shared-

      - name: Cache npm dependencies (service)
        uses: actions/cache@v4
        with:
          path: services/${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-npm-${{ matrix.service }}-${{ hashFiles(format('services/{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.service }}-

      - name: Install shared dependencies
        working-directory: services/shared
        run: npm ci

      - name: Run database migrations
        working-directory: services/shared
        run: npx drizzle-kit migrate --config drizzle.config.cjs

      - name: Install service dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test

  # ─── Integration Tests ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coreapps_test
          POSTGRES_PASSWORD: coreapps_test_pw
          POSTGRES_DB: coreapps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coreapps_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql://coreapps_test:coreapps_test_pw@localhost:5432/coreapps_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies (shared)
        uses: actions/cache@v4
        with:
          path: services/shared/node_modules
          key: ${{ runner.os }}-npm-shared-${{ hashFiles('services/shared/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-shared-

      - name: Cache npm dependencies (tests)
        uses: actions/cache@v4
        with:
          path: services/tests/node_modules
          key: ${{ runner.os }}-npm-tests-${{ hashFiles('services/tests/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-tests-

      - name: Install shared dependencies
        working-directory: services/shared
        run: npm ci

      - name: Run database migrations
        working-directory: services/shared
        run: npx drizzle-kit migrate --config drizzle.config.cjs

      - name: Install test dependencies
        working-directory: services/tests
        run: npm ci

      - name: Run integration tests
        working-directory: services/tests
        run: npx vitest run integration/payroll-accounting.test.js integration/invoice-payment.test.js

  # ─── Frontend E2E (Placeholder) ────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    if: false  # TODO: Enable when E2E tests are implemented

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: echo "TODO - Install frontend + Playwright/Cypress"

      - name: Run E2E tests
        run: echo "TODO - Run E2E tests"

  # ─── Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/alugra/apps/coreappas-services
            git pull origin main
            docker compose -f docker-compose.prod.yml up --build -d
            docker image prune -f
