name: CoreApps CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coreapps_test
          POSTGRES_PASSWORD: coreapps_test_pw
          POSTGRES_DB: coreapps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coreapps_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql://coreapps_test:coreapps_test_pw@localhost:5432/coreapps_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    strategy:
      matrix:
        service:
          - auth-service
          - hr-service
          - finance-service
          - inventory-service
          - crm-service
          - accounting-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies (shared)
        uses: actions/cache@v4
        with:
          path: services/shared/node_modules
          key: ${{ runner.os }}-npm-shared-${{ hashFiles('services/shared/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-shared-

      - name: Cache npm dependencies (service)
        uses: actions/cache@v4
        with:
          path: services/${{ matrix.service }}/node_modules
          key: ${{ runner.os }}-npm-${{ matrix.service }}-${{ hashFiles(format('services/{0}/package-lock.json', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ matrix.service }}-

      - name: Install shared dependencies
        working-directory: services/shared
        run: npm ci

      - name: Run database migrations
        working-directory: services/shared
        run: npx drizzle-kit migrate

      - name: Install service dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test

  # ─── Integration Tests ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coreapps_test
          POSTGRES_PASSWORD: coreapps_test_pw
          POSTGRES_DB: coreapps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coreapps_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DB_URL: postgresql://coreapps_test:coreapps_test_pw@localhost:5432/coreapps_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_REFRESH_SECRET: ci-test-refresh-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies (shared)
        uses: actions/cache@v4
        with:
          path: services/shared/node_modules
          key: ${{ runner.os }}-npm-shared-${{ hashFiles('services/shared/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-shared-

      - name: Cache npm dependencies (tests)
        uses: actions/cache@v4
        with:
          path: services/tests/node_modules
          key: ${{ runner.os }}-npm-tests-${{ hashFiles('services/tests/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-tests-

      - name: Install shared dependencies
        working-directory: services/shared
        run: npm ci

      - name: Run database migrations
        working-directory: services/shared
        run: npx drizzle-kit migrate

      - name: Install test dependencies
        working-directory: services/tests
        run: npm ci

      - name: Run integration tests
        working-directory: services/tests
        run: npm test

  # ─── Frontend E2E (Placeholder) ────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    if: false  # TODO: Enable when E2E tests are implemented

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: echo "TODO - Install frontend + Playwright/Cypress"

      - name: Run E2E tests
        run: echo "TODO - Run E2E tests"

  # ─── Build & Push Docker Images ────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    needs: [backend-tests, integration-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all service images
        run: |
          SERVICES="gateway auth-service crm-service finance-service hr-service inventory-service accounting-service analytics-service notification-service manufacturing-service asset-service integration-service"
          for service in $SERVICES; do
            echo "Building $service..."
            docker build \
              -t ghcr.io/${{ github.repository_owner }}/coreapps-$service:${{ github.sha }} \
              -t ghcr.io/${{ github.repository_owner }}/coreapps-$service:latest \
              -f services/$service/Dockerfile \
              . \
              --push
          done

  # ─── Deploy to Production VPS ──────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend
        working-directory: ../coreapps-app
        continue-on-error: true
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}
        run: npm ci && npm run build 2>&1 || echo "Frontend build skipped (coreapps-app not in same repo)"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /opt/coreapps/coreapps-alugra
            echo "Pulling latest code..."
            git pull origin main
            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.prod.yml pull
            echo "Starting services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Cleaning unused images..."
            docker image prune -f
            echo "Deployment complete at $(date)"
            echo "Service status:"
            docker compose -f docker-compose.prod.yml ps
